name: geoesplora
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  flutter_card_swiper: ^7.2.0
  flutter_map: ^8.3.0
  flutter_riverpod: ^3.3.1
  font_awesome_flutter: ^11.0.0
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:

    - family: AxiformaRegular
      fonts:
        - asset: assets/fonts/Axiforma-Regular.ttf
          weight: 400

    - family: AxiformaBold
      fonts:
        - asset: assets/fonts/Axiforma-Bold.ttf
          weight: 700

    - family: AxiformaLight
      fonts:
        - asset: assets/fonts/Axiforma-Light.ttf
          weight: 300

    - family: AxiformaBlack
      fonts:
      - asset: assets/fonts/Axiforma-Black.ttf
        weight: 900